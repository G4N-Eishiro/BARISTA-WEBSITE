<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist & Typographic Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-muted: #777777;
            --visual-placeholder: #f9f9f9;
            --visual-placeholder-hover: #f1f1f1;
            --border-color: #eeeeee;
            
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            font-weight: 300;
            line-height: 1.7;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 5rem 2rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14rem;
        }

        .logo {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.4rem;
            text-decoration: none;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 3.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
            position: relative;
            padding-bottom: 6px;
            transition: var(--transition);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--text-main);
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hero {
            max-width: 850px;
            margin-bottom: 14rem;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 5.5vw, 4.2rem);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.03em;
            margin-bottom: 3rem;
        }

        .hero h1 em {
            font-style: italic;
            font-weight: 400;
        }

        .hero p {
            font-size: clamp(1.05rem, 1.8vw, 1.25rem);
            color: var(--text-muted);
            max-width: 580px;
            font-weight: 300;
        }
        
        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 4rem;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5rem 4rem;
            margin-bottom: 10rem;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 4rem;
            }
            nav {
                margin-bottom: 7rem;
            }
            .hero {
                margin-bottom: 7rem;
            }
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .item-visual {
            width: 100%;
            aspect-ratio: 16 / 10;
            background-color: var(--visual-placeholder);
            margin-bottom: 1.8rem;
            transition: var(--transition);
            overflow: hidden;
        }

        .grid-item:hover .item-visual {
            background-color: var(--visual-placeholder-hover);
            transform: translateY(-2px);
        }

        .item-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 0.6rem;
            letter-spacing: -0.01em;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding-top: 5rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav>
            <a href="#" class="logo">GASDA(TAYTAY)-BARISTA 2026 BATCH 1</a>
            <div class="nav-links">
                <a href="#">Instructor</a>
                <a href="#">Students</a>
            </div>
        </nav>

        <main class="hero">
            <h1>TBA</h1>
            <p>TBA</p>
        </main>

        <h2 class="section-title">Contents</h2>
        <section class="grid">
            <a href="#" class="grid-item">
                <div class="item-visual"></div>
                <h3 class="item-title">Memories-TBA</h3>
            </a>
        </section>

        <footer>
            <p>&copy; 2026 GASDA-TESDA</p>
            <p>All Rights Reserved.</p>
        </footer>
    </div>

</body>
</html>
